<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password | ZAHIR Dashboard</title>
    <link rel="stylesheet" href="/css/dashboard.css">
</head>

<body>

    <div class="sidebar">
        <h2>ZAHIR</h2>

        <a href="/dashboard">Dashboard</a>
        <a href="/dashboard/users" sec:authorize="hasAnyRole('MANAGER','ADMIN')">Users</a>
        <a href="#">Orders</a>
        <a href="#">Perfumes</a>
        <a href="#">Customers</a>
        <a href="#">Vouchers</a>
    </div>

    <div class="main">
        <div class="topbar">
            Change Password
        </div>

        <div class="content">

            <div class="form-card">
                <h3>Change User Password</h3>

                <form th:action="@{/dashboard/users/{id}/change-password(id=${userId})}" th:object="${passwordRequest}"
                    method="post">

                    <div class="form-error" th:if="${#fields.hasGlobalErrors()}">
                        <p th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
                    </div>

                    <div class="form-group">
                        <label>New Password</label>
                        <input type="password" th:field="*{newPassword}" placeholder="Enter new password">
                        <small th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></small>
                    </div>

                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" th:field="*{confirmPassword}" placeholder="Confirm new password">
                        <small th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></small>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="create-btn">Change Password</button>
                        <a href="/dashboard/users" class="cancel-btn">Cancel</a>
                    </div>

                </form>
            </div>

        </div>
    </div>

</body>

</html>
